<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">占位图</title>
  <desc id="desc">用于《昨日简报》文章中的图片占位。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ee" />
      <stop offset="100%" stop-color="#ebe5da" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <g fill="none" stroke="#b8ad9b" stroke-width="2" opacity="0.9">
    <rect x="120" y="100" width="1360" height="700" rx="18" />
    <line x1="180" y1="220" x2="1420" y2="220" />
    <line x1="180" y1="300" x2="1040" y2="300" />
    <line x1="180" y1="352" x2="1180" y2="352" />
    <line x1="180" y1="404" x2="980" y2="404" />
    <rect x="180" y="500" width="420" height="170" rx="12" />
    <rect x="640" y="500" width="420" height="170" rx="12" />
    <rect x="1100" y="500" width="320" height="170" rx="12" />
  </g>
  <g fill="#5d5448" font-family="'Noto Serif SC', serif" text-anchor="middle">
    <text x="800" y="170" font-size="52">图片占位</text>
    <text x="800" y="255" font-size="28">后续可替换为官方图、截图或自制图卡</text>
    <text x="800" y="740" font-size="24" opacity="0.75">lemon-journal-site / essay draft</text>
  </g>
</svg>
